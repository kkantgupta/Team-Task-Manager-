<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Team Task Manager — Login</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <h1>&#9654; TaskFlow</h1>
      <p>Team Task Manager</p>
    </div>

    <div class="auth-tabs">
      <div class="auth-tab active" data-tab="login">Login</div>
      <div class="auth-tab" data-tab="signup">Sign Up</div>
    </div>

    <div id="alert" class="alert alert-error hidden"></div>

    <!-- Login Form -->
    <form id="loginForm">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="loginEmail" class="form-control" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" class="form-control" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="loginBtn">Login</button>
    </form>

    <!-- Signup Form -->
    <form id="signupForm" class="hidden">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="signupName" class="form-control" placeholder="John Doe" required />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="signupEmail" class="form-control" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label>Password <span class="text-muted">(min 6 chars)</span></label>
        <input type="password" id="signupPassword" class="form-control" placeholder="••••••••" required />
      </div>
      <div class="form-group">
        <label>Role</label>
        <select id="signupRole" class="form-control">
          <option value="member">Member</option>
          <option value="admin">Admin</option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="signupBtn">Create Account</button>
    </form>
  </div>

  <script>
    if (localStorage.getItem('ttm_token')) {
      window.location.href = 'dashboard.html';
    }

    const tabs = document.querySelectorAll('.auth-tab');
    const loginForm = document.getElementById('loginForm');
    const signupForm = document.getElementById('signupForm');
    const alert = document.getElementById('alert');

    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        const active = tab.dataset.tab;
        loginForm.classList.toggle('hidden', active !== 'login');
        signupForm.classList.toggle('hidden', active !== 'signup');
        hideAlert();
      });
    });

    function showAlert(msg) {
      alert.textContent = msg;
      alert.classList.remove('hidden');
    }
    function hideAlert() {
      alert.classList.add('hidden');
    }

    async function post(url, body) {
      const r = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      return r.json().then(d => ({ ok: r.ok, data: d }));
    }

    loginForm.addEventListener('submit', async e => {
      e.preventDefault();
      hideAlert();
      const btn = document.getElementById('loginBtn');
      btn.disabled = true; btn.textContent = 'Logging in…';

      const { ok, data } = await post('/api/auth/login', {
        email: document.getElementById('loginEmail').value,
        password: document.getElementById('loginPassword').value
      });

      btn.disabled = false; btn.textContent = 'Login';

      if (!ok) return showAlert(data.error || 'Login failed');
      localStorage.setItem('ttm_token', data.token);
      localStorage.setItem('ttm_user', JSON.stringify(data.user));
      window.location.href = 'dashboard.html';
    });

    signupForm.addEventListener('submit', async e => {
      e.preventDefault();
      hideAlert();
      const btn = document.getElementById('signupBtn');
      btn.disabled = true; btn.textContent = 'Creating account…';

      const { ok, data } = await post('/api/auth/signup', {
        name: document.getElementById('signupName').value,
        email: document.getElementById('signupEmail').value,
        password: document.getElementById('signupPassword').value,
        role: document.getElementById('signupRole').value
      });

      btn.disabled = false; btn.textContent = 'Create Account';

      if (!ok) return showAlert(data.error || 'Signup failed');
      localStorage.setItem('ttm_token', data.token);
      localStorage.setItem('ttm_user', JSON.stringify(data.user));
      window.location.href = 'dashboard.html';
    });
  </script>
</body>
</html>
